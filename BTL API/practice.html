<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tạo bài Test & Ôn tập</title>

<link rel="stylesheet" href="/css/admin.css">
<link rel="stylesheet" href="/css/practice.css">

</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <img src="/images/gtvt.png">
            <div class="school-name">EDUSO</div>
        </div>

        <ul>
            <li onclick="goHome()">🏠 Trang Chủ</li>
            <li onclick="goClass()">📚 Lớp Học</li>
            <li onclick="goTeacher()">📚 Giảng Viên</li>
            <li onclick="goSchedule()">📅 Lịch Dạy</li>
            <li onclick="goNews()">📰 Tin Tức</li>
            <li onclick="goGuide()">❓ Hướng Dẫn</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h2>🔥 Tạo bài Test & Ôn tập</h2>

        <div class="form-box">

            <select id="class_id"></select>

            <input type="text" id="name" placeholder="Nhập tên bài (VD: SQL luyện tập)">

            <select id="mode">
                <option value="test">📝 Bài Test (có điểm)</option>
                <option value="practice">🔥 Ôn tập (hiện đáp án)</option>
            </select>

            <input type="datetime-local" id="deadline">

            <button onclick="create()">🚀 Tạo bài</button>

        </div>

    </div>

</div>

<script src="/js/practice.js"></script>
</body>
</html>
