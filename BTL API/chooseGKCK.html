<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài kiểm tra</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/chooseGKCK.css">

    <style>
        /* ===== MODAL ===== */
        .modal{
            display: none;
            position: fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background: rgba(0,0,0,0.4);

            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content{
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s ease;
        }

        .modal-content h3{
            margin-bottom: 15px;
        }

        .modal-content input{
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .modal-actions{
            display: flex;
            gap: 10px;
        }

        .modal-actions button{
            flex:1;
            padding: 10px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size: 14px;
        }

        .save-btn{
            background:#2ecc71;
            color:white;
        }

        .cancel-btn{
            background:#e74c3c;
            color:white;
        }

        @keyframes fadeIn{
            from{
                transform: scale(0.8);
                opacity: 0;
            }
            to{
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <img src="/images/gtvt.png" alt="Logo">
            <div class="school-name">EDUSO</div>
        </div>

        <ul>
            <li onclick="goHome()">🏠 Trang chủ</li>
            <li onclick="goClass()">📚 Lớp của tôi</li>
            <li onclick="goSchedule()">📅 Lịch dạy</li>
            <li onclick="goNews()">📰 Tin tức</li>
            <li onclick="goGuide()">❓ Hướng dẫn</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">
        <h2 style="text-align:center;">📝 Thông Tin Bài Kiểm Tra</h2>

        <div id="list"></div>
    </div>

</div>

<!-- ===== MODAL CHỌN NGÀY ===== -->
<div id="dateModal" class="modal">
    <div class="modal-content">

        <h3>📅 Chọn ngày thi</h3>

        <input type="date" id="modalDate">

        <div class="modal-actions">
            <button class="save-btn" onclick="saveDate()">Lưu</button>
            <button class="cancel-btn" onclick="closeModal()">Hủy</button>
        </div>

    </div>
</div>

<!-- JS -->
<script src="/js/chooseGKCK.js"></script>

</body>
</html>
