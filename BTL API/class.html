<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lớp học</title>
    <link rel="stylesheet" href="/css/class.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <img src="/images/gtvt.png">
            <h2>EDUSO</h2>
        </div>

        <ul>
            <li onclick="goHome()">🏠 Trang Chủ</li>
            <li onclick="goClass()">📚 Lớp Học</li>
            <li onclick="goTeacher()">📚 Giảng Viên</li>
            <li onclick="goSchedule()">📅 Lịch Dạy</li>
            <li onclick="goNews()">📰 Tin Tức</li>
            <li onclick="goGuide()">❓ Hướng Dẫn</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="topbar">
            <h2>📚 Danh sách lớp</h2>

            <div class="top-actions">
                <input type="text" id="searchInput"
                    placeholder="🔍 Tìm theo tên lớp..."
                    onkeyup="searchClass()">

                <button onclick="openAdd()" class="btn-add">
                    + Tạo lớp
                </button>
            </div>
        </div>

        <div id="classList" class="class-grid"></div>

    </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
    <div class="popup-box">

        <h3 id="title">Tạo lớp</h3>

        <input id="className" placeholder="Nhập tên lớp...">
        <select id="teacherSelect"></select>

        <div class="popup-actions">
            <button class="btn-save" onclick="save()">💾 Lưu</button>
            <button class="btn-cancel" onclick="closePopup()">✖ Hủy</button>
        </div>

    </div>
</div>

<script src="/js/class.js"></script>

</body>
</html>
