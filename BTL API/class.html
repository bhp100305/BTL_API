<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lớp học</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/class.css">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 class="logo">EDUSO</h2>

        <ul>
            <li onclick="goHome()">🏠 Trang chủ</li>
            <li class="active">📚 Lớp của tôi</li>
            <li onclick="goManage()">📁 Quản lý</li>
            <li onclick="goMaterial()">📖 Học liệu</li>
            <li onclick="goSchedule()">📅 Lịch dạy</li>
            <li onclick="goExamMenu()">📝 Khảo thí</li>
            <li onclick="goNews()">📰 Tin tức</li>
            <li onclick="goGuide()">❓ Hướng dẫn</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="breadcrumb">
            Trang chủ / Lớp học
        </div>

        <h2>📚 Danh sách lớp</h2>

        <button onclick="openAdd()" class="btn-add">+ Tạo lớp</button>

        <div id="classList" class="class-grid"></div>

    </div>
    <div id="popup" class="popup hidden">
        <div class="popup-box">
            <h3 id="title">Tạo lớp</h3>
            <input id="className" placeholder="Tên lớp">

            <button onclick="save()">Lưu</button>
            <button onclick="closePopup()">Hủy</button>
        </div>
    </div>
    
</div>

<script src="/js/class.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
