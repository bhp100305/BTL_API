<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo câu hỏi</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/question.css">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <img src="/images/gtvt.png">
            <div class="school-name">EDUSO</div>
        </div>

        <ul>
            <li onclick="goHome()">🏠 Trang Chủ</li>
            <li onclick="goClass()">📚 Lớp Học</li>
            <li onclick="goTeacher()">📚 Giảng Viên</li>
            <li onclick="goSchedule()">📅 Lịch Dạy</li>
            <li onclick="goNews()">📰 Tin Tức</li>
            <li onclick="goGuide()">❓ Hướng Dẫn</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="page-header">
            <h1>📚 Tạo câu hỏi cho bài thi</h1>
            <p>Thêm câu hỏi thủ công hoặc import nhanh từ file Excel</p>
        </div>

        <!-- IMPORT -->
        <div class="form-box import-box">
            <h3>📥 Import từ Excel</h3>

            <div class="import-row">
                <input type="file" id="excelFile" accept=".xlsx,.xls">
                <button class="import-btn" onclick="importExcel()">Import Excel</button>
            </div>

            <small>
                Format file: question | A | B | C | D | correct
            </small>
        </div>

        <!-- THÊM THỦ CÔNG -->
        <div class="form-box">

            <h3>✍️ Thêm câu hỏi thủ công</h3>

            <label>Câu hỏi</label>
            <textarea id="question" placeholder="Nhập nội dung câu hỏi..."></textarea>

            <div class="answers">
                <div class="answer-group">
                    <label>Đáp án A</label>
                    <input id="a" placeholder="Nhập đáp án A">
                </div>

                <div class="answer-group">
                    <label>Đáp án B</label>
                    <input id="b" placeholder="Nhập đáp án B">
                </div>

                <div class="answer-group">
                    <label>Đáp án C</label>
                    <input id="c" placeholder="Nhập đáp án C">
                </div>

                <div class="answer-group">
                    <label>Đáp án D</label>
                    <input id="d" placeholder="Nhập đáp án D">
                </div>
            </div>

            <label>Đáp án đúng</label>
            <select id="correct">
                <option value="A">Đáp án A</option>
                <option value="B">Đáp án B</option>
                <option value="C">Đáp án C</option>
                <option value="D">Đáp án D</option>
            </select>

            <div class="btn-group">
                <button class="add-btn" onclick="add()">➕ Thêm câu hỏi</button>
                
            </div>

        </div>

        <div class="question-list">
            <h3>📋 Danh sách câu hỏi</h3>
            <div id="list"></div>
        </div>
        <div class="save-section">
            <button class="save-all-btn" onclick="saveAll()">💾 Lưu tất cả câu hỏi</button>
        </div>
    </div>
    
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="/js/question.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
