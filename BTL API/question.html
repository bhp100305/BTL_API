<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo câu hỏi</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/question.css">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <img src="/images/gtvt.png">
            <div class="school-name">EDUSO</div>
        </div>

        <ul>
            <li onclick="goHome()">🏠 Trang chủ</li>
            <li onclick="goClass()">📚 Lớp</li>
            <li onclick="goSchedule()">📅 Lịch</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h2>📚 Tạo câu hỏi</h2>

        <div class="form-box">

            <textarea id="question" placeholder="Nhập câu hỏi..."></textarea>

            <div class="answers">
                <input id="a" placeholder="Đáp án A">
                <input id="b" placeholder="Đáp án B">
                <input id="c" placeholder="Đáp án C">
                <input id="d" placeholder="Đáp án D">
            </div>

            <select id="correct">
                <option value="A">Đáp án đúng A</option>
                <option value="B">Đáp án đúng B</option>
                <option value="C">Đáp án đúng C</option>
                <option value="D">Đáp án đúng D</option>
            </select>

            <div class="btn-group">
                <button onclick="add()">➕ Thêm</button>
                <button onclick="generateAI()">🤖 AI tạo nhanh</button>
            </div>

        </div>

        <div id="list"></div>

    </div>
</div>

<script src="/js/question.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
