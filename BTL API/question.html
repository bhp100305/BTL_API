<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo câu hỏi</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/question.css">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2 class="logo">EDUSO</h2>

        <ul>
            <li onclick="goHome()">🏠 Trang chủ</li>
            <li onclick="goClass()">📚 Lớp của tôi</li>
            <li onclick="goManage()">📁 Quản lý</li>
            <li onclick="goMaterial()">📖 Học liệu</li>
            <li onclick="goSchedule()">📅 Lịch dạy</li>
            <li onclick="goExamMenu()">📝 Khảo thí</li>
            <li onclick="goNews()">📰 Tin tức</li>
            <li onclick="goGuide()">❓ Hướng dẫn</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h2>📚 Tạo câu hỏi trắc nghiệm</h2>

        <div class="form-box">
            <input id="question" placeholder="Câu hỏi">

            <input id="a" placeholder="Đáp án A">
            <input id="b" placeholder="Đáp án B">
            <input id="c" placeholder="Đáp án C">
            <input id="d" placeholder="Đáp án D">

            <select id="correct">
                <option value="A">Đáp án đúng A</option>
                <option value="B">Đáp án đúng B</option>
                <option value="C">Đáp án đúng C</option>
                <option value="D">Đáp án đúng D</option>
            </select>

            <button onclick="add()">➕ Thêm câu hỏi</button>
        </div>

        <hr>

        <div id="list"></div>

    </div>

</div>

<script src="/js/question.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
