<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Tin tức</title>

    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/news.css">

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <img src="images/gtvt.png" alt="logo">
                <h2>EDUSO</h2>
            </div>

            <ul>
                <li onclick="goHome()">🏠 Trang chủ</li>
                <li onclick="goClass()">📚 Lớp của tôi</li>

            </ul>
        </aside>

        <!-- MAIN -->
        <div class="main">

            <!-- HEADER -->
            <div class="top-bar">
                <input type="text" id="search" placeholder="🔍 Tìm tin...">

                <select id="filter">
                    <option value="">Tất cả</option>
                    <option value="Java">Java</option>
                    <option value="SQL">SQL</option>
                    <option value="Tips">Tips</option>
                </select>
            </div>

            <!-- SLIDER -->
            <div id="slider" class="slider"></div>

            <!-- GRID -->
            <div id="newsList" class="news-grid"></div>

        </div>
    </div>

    <script src="/js/news.js"></script>

</html>
